Yes. Here is a full page you can copy/paste. It removes the barcode/AI scan flow and adds manual category entry plus category-based repurchase search.

```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>CatchLog Manual Tackle</title>
<style>
:root {
  --bg:#070b14; --bg2:#111827; --card:rgba(17,24,39,0.85);
  --border:rgba(255,255,255,0.08); --text:#f8fafc; --text2:#9ca3af;
  --primary:#06b6d4; --accent:#f59e0b; --radius:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:linear-gradient(180deg,#050814,#111827);color:var(--text)}
body{overflow:hidden}
#app{max-width:430px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;border-left:1px solid var(--border);border-right:1px solid var(--border);background:rgba(7,11,20,.96)}
.hdr{height:68px;padding:0 18px;background:rgba(15,23,42,.96);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.hdr-title{font-size:18px;font-weight:800}
.screen{position:absolute;inset:0;overflow-y:auto;padding-bottom:98px;padding-top:16px}
.section-label{font-size:11px;font-weight:800;text-transform:uppercase;color:var(--text2);letter-spacing:.15em;margin:16px 18px 10px}
.card{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:16px;margin:0 18px 14px}
.btn{border:none;border-radius:14px;padding:12px 16px;font-size:13px;font-weight:700;cursor:pointer}
.btn-primary{background:linear-gradient(135deg,#06b6d4,#0891b2);color:#fff}
.btn-secondary{background:rgba(255,255,255,.06);color:var(--text);border:1px solid var(--border)}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px}
.form-input,.form-select{width:100%;padding:12px 14px;border-radius:14px;border:1px solid var(--border);background:#111827;color:var(--text);font-size:14px}
.tackle-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 18px 18px}
.tackle-card{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:22px;overflow:hidden}
.tackle-img{height:100px;background:#111827;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:12px;padding:12px;text-align:center}
.tackle-body{padding:12px;display:flex;flex-direction:column;gap:8px}
.lure-name{font-size:14px;font-weight:800;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lure-category{font-size:11px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.tally-row{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--text2)}
.tally-controls{display:flex;gap:6px}
.tally-btn{width:28px;height:28px;border-radius:50%;border:none;background:rgba(255,255,255,.08);color:var(--text);cursor:pointer}
.modal-overlay{position:fixed;inset:0;background:rgba(4,8,19,.85);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;z-index:50}
.modal-overlay.active{display:flex}
.modal-card{width:92%;max-width:360px;background:rgba(17,24,39,.98);border:1px solid var(--border);border-radius:22px;padding:22px;box-shadow:0 22px 48px rgba(0,0,0,.45)}
#toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:rgba(6,182,212,.95);color:#fff;padding:10px 18px;border-radius:999px;font-size:13px;font-weight:700;opacity:0;pointer-events:none;transition:opacity .2s}
#toast.show{opacity:1}
#bottom-nav{position:fixed;bottom:0;left:0;right:0;height:82px;background:rgba(7,11,20,.98);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;z-index:40}
.nav-item{color:var(--text2);font-size:11px;text-transform:uppercase;letter-spacing:.12em;font-weight:800}
</style>
</head>
<body>
<div id="toast"></div>

<div id="manual-lure-modal" class="modal-overlay" onclick="closeManualLureModal(event)">
  <div class="modal-card" onclick="event.stopPropagation()">
    <h3 style="margin-bottom:12px;font-size:17px;font-weight:800;">Add Lure Manually</h3>
    <div class="form-group">
      <label class="form-label">Lure Name</label>
      <input type="text" id="manual-lure-name" class="form-input" placeholder="Enter lure name" />
    </div>
    <div class="form-group">
      <label class="form-label">Lure Category</label>
      <select id="manual-lure-category" class="form-select"></select>
    </div>
    <div class="form-group">
      <label class="form-label">Quantity</label>
      <input type="number" id="manual-lure-qty" class="form-input" min="1" value="1" />
    </div>
    <div style="display:flex;gap:10px;margin-top:16px;">
      <button class="btn btn-primary" onclick="saveManualLure()">Save</button>
      <button class="btn btn-secondary" onclick="closeManualLureModal()">Cancel</button>
    </div>
  </div>
</div>

<div id="trash-modal" class="modal-overlay" onclick="cancelTrashPrompt(event)">
  <div class="modal-card" onclick="event.stopPropagation()">
    <h3 style="margin-bottom:10px;font-size:17px;font-weight:800;">Remove Lure</h3>
    <p id="trash-modal-text" style="font-size:13px;color:var(--text2);line-height:1.6;"></p>
    <div style="display:flex;gap:10px;margin-top:18px;">
      <button class="btn btn-secondary" style="flex:1;" onclick="confirmRemoveLure()">Remove</button>
      <button class="btn btn-primary" style="flex:1;" onclick="repurchaseLure()">Repurchase</button>
    </div>
    <button class="btn btn-secondary" style="margin-top:16px;width:100%;" onclick="cancelTrashPrompt()">Cancel</button>
  </div>
</div>

<div id="app">
  <header class="hdr">
    <div class="hdr-title">CatchLog Tackle</div>
    <button class="btn btn-secondary" style="font-size:12px" onclick="openManualLureModal()">＋ Add Lure</button>
  </header>

  <main class="screen">
    <div class="section-label">Your Tackle Box Inventory</div>
    <div id="tackle-grid" class="tackle-grid"></div>
  </main>

  <nav id="bottom-nav">
    <div class="nav-item">Manual entry only — no barcode/AI</div>
  </nav>
</div>

<script>
const lureCategories = [
  'Topwater/Poppers',
  'Lipless Crankbaits',
  'Soft Plastics',
  'Spinnerbaits/Blades',
  'Diving Crankbaits',
  'Jigs',
  'Swimbaits',
  'Buzzbaits',
  'Worms',
  'Senko/Stickbaits'
];

let lures = JSON.parse(localStorage.getItem('n_lures')) || [
  {id:'l1',name:'Neon Crawfish Popper',qty:2,category:'Topwater/Poppers',cost:5.49,purchaseUrl:'https://www.basspro.com/search/results.html?searchInput=Topwater%2FPoppers'},
  {id:'l2',name:'Chartreuse Worm',qty:3,category:'Soft Plastics',cost:4.99,purchaseUrl:'https://www.basspro.com/search/results.html?searchInput=Soft%20Plastics'}
];

let pendingTrashLureId = null;

function showToast(message){
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.add('show');
  clearTimeout(window.toastTimeout);
  window.toastTimeout = setTimeout(()=>toast.classList.remove('show'),1800);
}

function getBassProSearchUrl(query){
  return `https://www.basspro.com/search/results.html?searchInput=${encodeURIComponent(query)}`;
}

function populateManualLureCategories(){
  const select = document.getElementById('manual-lure-category');
  if(!select) return;
  select.innerHTML = lureCategories.map(cat => `<option value="${cat}">${cat}</option>`).join('');
}

function openManualLureModal(){
  populateManualLureCategories();
  document.getElementById('manual-lure-name').value = '';
  document.getElementById('manual-lure-qty').value = 1;
  document.getElementById('manual-lure-modal').classList.add('active');
}

function closeManualLureModal(e){
  if(e && e.target !== e.currentTarget) return;
  document.getElementById('manual-lure-modal').classList.remove('active');
}

function saveManualLure(){
  const name = document.getElementById('manual-lure-name').value.trim() || 'Manual Lure';
  const category = document.getElementById('manual-lure-category').value || 'Other';
  const qty = Math.max(1, parseInt(document.getElementById('manual-lure-qty').value, 10) || 1);

  lures.unshift({
    id: 'l_' + Date.now(),
    name,
    qty,
    category,
    cost: 6.99,
    purchaseUrl: getBassProSearchUrl(category)
  });

  localStorage.setItem('n_lures', JSON.stringify(lures));
  closeManualLureModal();
  refreshTackleGrid();
  showToast('Lure added manually.');
}

function openTrashModal(lureId){
  pendingTrashLureId = lureId;
  const lure = lures.find(l => l.id === lureId);
  const text = lure
    ? `Remove "${lure.name}" from tackle box or search BassPro for ${lure.category || lure.name}?`
    : 'Remove this item?';
  document.getElementById('trash-modal-text').innerText = text;
  document.getElementById('trash-modal').classList.add('active');
}

function cancelTrashPrompt(e){
  if(e && e.target !== e.currentTarget) return;
  pendingTrashLureId = null;
  document.getElementById('trash-modal').classList.remove('active');
}

function confirmRemoveLure(){
  if(!pendingTrashLureId) return;
  lures = lures.filter(l => l.id !== pendingTrashLureId);
  localStorage.setItem('n_lures', JSON.stringify(lures));
  pendingTrashLureId = null;
  document.getElementById('trash-modal').classList.remove('active');
  refreshTackleGrid();
  showToast('Item removed.');
}

function repurchaseLure(){
  if(!pendingTrashLureId) return;
  const lure = lures.find(l => l.id === pendingTrashLureId);
  if(!lure) return;
  const searchTerm = lure.category || lure.name;
  window.open(getBassProSearchUrl(searchTerm), '_blank');
  pendingTrashLureId = null;
  document.getElementById('trash-modal').classList.remove('active');
  showToast('Opening BassPro search for that category.');
}

function refreshTackleGrid(){
  const grid = document.getElementById('tackle-grid');
  grid.innerHTML = lures.map(l => `
    <div class="tackle-card">
      <div class="tackle-img">${l.img ? `<img src="${l.img}" alt="${l.name}" style="width:100%;height:100%;object-fit:cover;border-radius:0 0 0 0;" />` : 'No photo available'}</div>
      <div class="tackle-body">
        <div class="lure-category">${l.category || 'Uncategorized'}</div>
        <div class="lure-name">${l.name}</div>
        <div class="tally-row">
          <span>Qty: ${l.qty}</span>
          <div class="tally-controls">
            <button class="tally-btn" onclick="modifyQuantity('${l.id}',-1)">-</button>
            <button class="tally-btn" onclick="modifyQuantity('${l.id}',1)">+</button>
            <button class="tally-btn" onclick="openTrashModal('${l.id}')">🗑</button>
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

function modifyQuantity(id, delta){
  const lure = lures.find(l => l.id === id);
  if(!lure) return;
  lure.qty = Math.max(0, lure.qty + delta);
  localStorage.setItem('n_lures', JSON.stringify(lures));
  refreshTackleGrid();
}

window.onload = () => {
  refreshTackleGrid();
};
</script>
</body>
</html>
```
