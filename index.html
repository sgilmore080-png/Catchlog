<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>CatchLog Pro</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root{--bg:#0d1117;--bg2:#161b22;--text:#e6edf3;--primary:#00b4d8;}
  body{margin:0;font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;}

  /* Persistent Background Logo */
  .bg-logo {
    position:fixed; top:0; left:0; width:100%; height:100%;
    z-index:-1; display:flex; align-items:center; justify-content:center;
    opacity:0.05; pointer-events:none;
  }
  .bg-logo svg { width:60vw; height:60vw; fill:var(--primary); }

  #app{max-width:430px; margin:0 auto; height:100dvh; display:flex; flex-direction:column; align-items:center; justify-content:center;}
  .screen{width:100%; padding:20px; box-sizing:border-box; display:none;}
  .screen.active{display:block;}

  .card{background:var(--bg2); border:1px solid #30363d; border-radius:16px; padding:24px; text-align:center;}
  .form-input{width:100%; background:#21262d; border:1px solid #30363d; border-radius:10px; padding:12px; color:white; margin-top:8px; box-sizing:border-box;}
</style>
</head>
<body>

<div class="bg-logo">
  <svg viewBox="0 0 24 24"><path d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,4A8,8 0 0,1 20,12A8,8 0 0,1 12,20A8,8 0 0,1 4,12A8,8 0 0,1 12,4M12,6A6,6 0 0,0 6,12A6,6 0 0,0 12,18A6,6 0 0,0 18,12A6,6 0 0,0 12,6M12,8A4,4 0 0,1 16,12A4,4 0 0,1 12,16A4,4 0 0,1 8,12A4,4 0 0,1 12,8Z"/></svg>
</div>

<div id="app">
  <div id="auth-screen" class="screen active">
    <div class="card">
      <h2>CatchLog Pro</h2>
      <p style="color:#8b949e;">Authenticate to continue</p>
      
      <div id="g_id_onload" 
           data-client_id="140072363507-va0oj0utgseagrtl4diqprefulod4jsv.apps.googleusercontent.com" 
           data-callback="handleLogin">
      </div>
      <div class="g_id_signin" data-type="standard"></div>
    </div>
  </div>

  <div id="log-screen" class="screen">
    <div class="card">
      <label style="font-weight:600; display:block; text-align:left;">Target Species</label>
      <input list="fish-list" class="form-input" placeholder="Type or select fish...">
      <datalist id="fish-list">
        <option value="Largemouth Bass">
        <option value="Smallmouth Bass">
        <option value="Walleye">
        <option value="Bluegill">
        <option value="Crappie">
        <option value="Channel Catfish">
        <option value="Rainbow Trout">
      </datalist>
    </div>
  </div>
</div>

<script>
  function handleLogin(response) {
    // Switch from Auth to Log screen
    document.getElementById('auth-screen').classList.remove('active');
    document.getElementById('log-screen').classList.add('active');
  }
</script>
</body>
</html>
