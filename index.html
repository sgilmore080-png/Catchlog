<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>CatchLog Pro – Tactical Interface</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
/* ── DESIGN TOKENS ────────────────── */
:root{
  --bg: #0a0f1d; --bg2: #111827; --bg3: #1f2937; --border: rgba(255, 255, 255, 0.08);
  --text: #f3f4f6; --text2: #9ca3af; --text3: #6b7280; --primary: #06b6d4; --primary-d: #0891b2;
  --accent2: #10b981; --card: rgba(17, 24, 39, 0.7); --radius-sm: 12px;
}
body{margin:0;font-family:system-ui, sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;}
#app{width:100%;max-width:430px;height:100dvh;margin:0 auto;display:flex;flex-direction:column;background:rgba(10, 15, 29, 0.95);}
.screen{flex:1;overflow-y:auto;padding-bottom:100px;display:none;}
.screen.active{display:block;}
.hdr{height:64px;display:flex;align-items:center;padding:0 20px;border-bottom:1px solid var(--border);}
.btn-scan{background:rgba(6, 182, 212, 0.15);border:1px dashed var(--primary);color:#fff;padding:12px;border-radius:var(--radius-sm);cursor:pointer;width:100%;font-weight:700;}
.tackle-box-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; margin-bottom: 10px; }
.hw-item-card { display: flex; align-items: center; gap: 14px; background: rgba(31, 41, 55, 0.45); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; margin-bottom: 10px; }
#camera-viewfinder-overlay { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; }
.viewfinder-video { flex:1; object-fit: cover; }
</style>
</head>
<body>

<div id="camera-viewfinder-overlay">
  <video id="viewfinder-video" class="viewfinder-video" autoplay playsinline muted></video>
  <button style="padding:20px;" onclick="shutdownCameraStream()">Cancel Scan</button>
</div>

<div id="app">
  <header class="hdr"><h2>CatchLog Tactical</h2></header>
  
  <main style="flex:1; position:relative;">
    <div id="screen-tackle" class="screen active">
      <div style="padding: 16px;">
        <div class="hw-item-card">
          <div>Smart Bobber Pro Node</div>
          <button onclick="alert('Pairing...')">Pair</button>
        </div>
        
        <button class="btn-scan" onclick="bootBarcodeScanner()">
          █▉ Scan New Lure Barcode
        </button>
      </div>
      <div id="tackle-grid" style="padding:0 16px;"></div>
    </div>
  </main>

  <nav id="bottom-nav" style="height:76px; background:var(--bg2); display:flex; justify-content:space-around; align-items:center;">
    <div onclick="console.log('Nav Clicked')">Home</div>
    <div onclick="console.log('Nav Clicked')">Map</div>
    <div onclick="console.log('Nav Clicked')">Tackle</div>
  </nav>
</div>

<script>
  let lures = JSON.parse(localStorage.getItem('n_lures')) || [];

  function bootBarcodeScanner() {
    document.getElementById('camera-viewfinder-overlay').style.display = 'flex';
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
      .then(stream => { document.getElementById('viewfinder-video').srcObject = stream; })
      .catch(err => alert("Camera access required."));
  }

  function shutdownCameraStream() {
    const video = document.getElementById('viewfinder-video');
    if(video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
    document.getElementById('camera-viewfinder-overlay').style.display = 'none';
    
    // Simulate adding a barcode item
    lures.push({ name: "Scanned Lure UPC-5344", cost: 6.99 });
    localStorage.setItem('n_lures', JSON.stringify(lures));
    renderTackle();
  }

  function renderTackle() {
    const grid = document.getElementById('tackle-grid');
    grid.innerHTML = lures.map(l => `
      <div class="tackle-box-card">
        <strong>${l.name}</strong>
        <p>Market Avg: $${l.cost}</p>
      </div>
    `).join('');
  }

  renderTackle();
</script>
</body>
</html>
