<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>CatchLog Pro – Complete Ecosystem</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root{
    --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--text:#e6edf3;--text2:#8b949e;
    --primary:#00b4d8;
  }
  html,body{height:100%;margin:0;font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}

  /* Persistent Background Logo */
  #bg-logo {
    position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;
    display:flex;align-items:center;justify-content:center;opacity:0.06;
  }
  #bg-logo svg { width:50vh; height:50vh; fill:var(--primary); }

  #app{position:relative;width:100%;max-width:430px;height:100dvh;margin:0 auto;background:rgba(13,17,23,0.92);display:flex;flex-direction:column;border-left:1px solid #30363d;border-right:1px solid #30363d;}
  .screen{position:absolute;inset:0;opacity:0;pointer-events:none;transition:opacity .3s;display:flex;flex-direction:column;justify-content:center;padding:20px;}
  .screen.active{opacity:1;pointer-events:auto;}

  .card{background:var(--bg2);border:1px solid #30363d;border-radius:16px;padding:24px;text-align:center}
  
  /* Input Styles */
  .form-input{width:100%;background:var(--bg3);border:1px solid #30363d;border-radius:10px;padding:12px;color:var(--text);margin-top:8px;box-sizing:border-box;}
  .split-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px;text-align:left;}
</style>
</head>
<body>

<div id="bg-logo">
  <svg viewBox="0 0 24 24"><path d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,4A8,8 0 0,1 20,12A8,8 0 0,1 12,20A8,8 0 0,1 4,12A8,8 0 0,1 12,4M12,6A6,6 0 0,0 6,12A6,6 0 0,0 12,18A6,6 0 0,0 18,12A6,6 0 0,0 12,6M12,8A4,4 0 0,1 16,12A4,4 0 0,1 12,16A4,4 0 0,1 8,12A4,4 0 0,1 12,8Z"/></svg>
</div>

<div id="app">
  <div id="auth-screen" class="screen active">
    <div class="card">
      <h2>CatchLog Pro</h2>
      <p style="color:var(--text2);">Authenticate with Google to continue.</p>
      <div id="g_id_onload" data-client_id="YOUR_GOOGLE_CLIENT_ID" data-callback="handleLogin"></div>
      <div class="g_id_signin" data-type="standard"></div>
    </div>
  </div>

  <div id="log-screen" class="screen">
    <div class="card">
      <label style="font-weight:600;display:block;text-align:left;">Target Species Profile</label>
      <div class="split-row">
        <input type="text" id="species-input" class="form-input" placeholder="Enter species..." oninput="checkManualInput()"/>
        <select id="species-select" class="form-input" onchange="commitSpecies(this.value)">
          <option value="none">None</option>
          <option value="Largemouth Bass">Largemouth Bass</option>
          <option value="Smallmouth Bass">Smallmouth Bass</option>
          <option value="Spotted Bass">Spotted Bass</option>
          <option value="Bluegill">Bluegill</option>
          <option value="Crappie">Crappie</option>
          <option value="Channel Catfish">Channel Catfish</option>
          <option value="Flathead Catfish">Flathead Catfish</option>
          <option value="Blue Catfish">Blue Catfish</option>
          <option value="Walleye">Walleye</option>
          <option value="Sauger">Sauger</option>
          <option value="Northern Pike">Northern Pike</option>
          <option value="Muskellunge">Muskellunge</option>
          <option value="Rainbow Trout">Rainbow Trout</option>
          <option value="Brown Trout">Brown Trout</option>
          <option value="Brook Trout">Brook Trout</option>
          <option value="Common Carp">Common Carp</option>
          <option value="White Bass">White Bass</option>
          <option value="Yellow Perch">Yellow Perch</option>
        </select>
      </div>
    </div>
  </div>
</div>

<script>
  const select = document.getElementById('species-select');
  const input = document.getElementById('species-input');

  // Triggered by Google OAuth
  function handleLogin(response) {
    document.getElementById('auth-screen').classList.remove('active');
    document.getElementById('log-screen').classList.add('active');
  }

  // Hover logic: preview in placeholder only
  select.addEventListener('mouseover', (e) => {
    if(e.target.tagName === 'OPTION' && e.target.value !== 'none') {
      input.placeholder = e.target.value;
    }
  });

  select.addEventListener('mouseout', () => {
    input.placeholder = "Enter species...";
  });

  // Commit logic: Only on select change (click)
  function commitSpecies(val) {
    if(val !== 'none') {
      input.value = val;
    }
  }

  // Manual typing reset
  function checkManualInput() {
    if(input.value.length > 0) {
      select.value = 'none';
    }
  }
</script>
</body>
</html>
